version: '3.8'

services:
  # PostgreSQL (for production-like local dev)
  postgres:
    image: postgres:16-alpine
    container_name: tradepro-db
    environment:
      POSTGRES_DB: tradeprodb
      POSTGRES_USER: tradepro
      POSTGRES_PASSWORD: tradepro123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradepro-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/tradeprodb
      DB_USERNAME: tradepro
      DB_PASSWORD: tradepro123
      JWT_SECRET: change-this-secret-in-production-must-be-very-long
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradepro-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
