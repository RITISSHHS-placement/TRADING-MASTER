<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TradePro</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages serves a 404 for a deep link like /dashboard/trade,
      // this page captures the path and redirects to index.html with it encoded
      // as a query param. The index.html then restores it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
