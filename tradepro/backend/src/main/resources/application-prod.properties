# ===========================
# TradePro PRODUCTION Config
# ===========================
# Set these as environment variables on your server / Docker / Railway / Render

# Server
server.port=${PORT:8080}

# ---- PostgreSQL ----
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tradeprodb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:tradepro}
spring.datasource.password=${DB_PASSWORD:changeme}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway (uncomment once you add migration scripts)
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# ---- JWT ----
jwt.secret=${JWT_SECRET:change-this-in-production-must-be-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ---- TOTP ----
totp.issuer=${TOTP_ISSUER:TradePro}

# ---- CORS ----
cors.allowed-origins=${CORS_ORIGINS:https://yourdomain.com}

# ---- Logging ----
logging.level.com.tradepro=INFO
logging.level.root=WARN
