# ===========================
# TradePro Application Config
# ===========================

# Server
server.port=8080
spring.application.name=tradepro-backend

# ---- DATABASE (H2 for dev, switch to PostgreSQL for prod) ----
spring.datasource.url=jdbc:h2:mem:tradeprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=tradepro-super-secret-key-minimum-256-bits-long-change-in-production
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ---- TOTP ----
totp.issuer=TradePro

# ---- CORS ----
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ---- Logging ----
logging.level.com.tradepro=DEBUG
logging.level.org.springframework.security=WARN
