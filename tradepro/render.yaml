

services:
  # ── Spring Boot Backend ──
  - type: web
    name: tradepro-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: tradepro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tradepro-frontend.onrender.com
      - key: TOTP_ISSUER
        value: TradePro
    healthCheckPath: /api/health

  # ── React Frontend ──
  - type: web
    name: tradepro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://tradepro-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: tradepro-db
    plan: free
    databaseName: tradeprodb
    user: tradepro
